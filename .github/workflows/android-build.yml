name: Android CI Build

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run clean test assembleDebug
        id: build
        run: ./gradlew clean test assembleDebug --stacktrace 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload unit test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-xml
          path: app/build/test-results/**/*.xml
          if-no-files-found: warn

      - name: Upload unit test results (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-html
          path: app/build/reports/tests/**
          if-no-files-found: warn

      - name: Run lint
        if: always()
        run: ./gradlew lint --stacktrace 2>&1 | tee lint.log
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            app/build/reports/lint-results*.html
            app/build/reports/lint-results*.xml
            lint.log
          if-no-files-found: warn

      - name: Upload debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Fail workflow if build failed
        if: steps.build.outcome != 'success'
        run: |
          echo "clean test assembleDebug failed — see build-log artifact."
          exit 1
