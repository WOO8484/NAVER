name: Android Release Build (Signed)

on:
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check signing secrets present
        id: secrets_check
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && \
             [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      # Secrets가 없으면 이 워크플로우는 서명된 release APK를 만든 것처럼 보고하지 않고 여기서 중단한다.
      - name: Stop if signing secrets are missing
        if: steps.secrets_check.outputs.has_secrets != 'true'
        run: |
          echo "ANDROID_KEYSTORE_BASE64/ANDROID_KEYSTORE_PASSWORD/ANDROID_KEY_ALIAS/ANDROID_KEY_PASSWORD 중 하나 이상이 설정되지 않았습니다."
          echo "release APK는 생성하지 않습니다. (debug APK는 android-build.yml 워크플로우를 이용하세요.)"
          exit 1

      - name: Decode keystore
        if: steps.secrets_check.outputs.has_secrets == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Run clean assembleRelease (signed)
        if: steps.secrets_check.outputs.has_secrets == 'true'
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --stacktrace 2>&1 | tee release-build.log

      - name: Remove decoded keystore (never keep it in logs/artifacts)
        if: always()
        run: rm -f release.keystore

      - name: Upload release build log
        if: steps.secrets_check.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-build-log
          path: release-build.log

      - name: Upload signed release APK
        if: steps.secrets_check.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
